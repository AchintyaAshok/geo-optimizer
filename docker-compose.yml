services:
  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
      - crawllmer-db:/app/data
    environment:

      CRAWLLMER_DB_URL: sqlite:////app/data/crawllmer.db
      CRAWLLMER_CELERY_BROKER_URL: sqla+sqlite:////app/data/celery-broker.db
      CRAWLLMER_CELERY_RESULT_BACKEND: db+sqlite:////app/data/celery-results.db
    command: >
      bash -lc "pip install uv && uv sync && uv run uvicorn crawllmer.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
      - crawllmer-db:/app/data
    environment:

      CRAWLLMER_DB_URL: sqlite:////app/data/crawllmer.db
      CRAWLLMER_CELERY_BROKER_URL: sqla+sqlite:////app/data/celery-broker.db
      CRAWLLMER_CELERY_RESULT_BACKEND: db+sqlite:////app/data/celery-results.db
      CRAWLLMER_WORKER_POLL_SECONDS: "2"
    depends_on:
      api:
        condition: service_healthy
    command: >
      bash -lc "pip install uv && uv sync && uv run python -m crawllmer.app.indexer"

volumes:
  crawllmer-db:
