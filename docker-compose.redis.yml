services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker-redis:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
      - crawllmer-db:/app/data
    environment:
      CRAWLLMER_DB_URL: sqlite:////app/data/crawllmer.db
      CRAWLLMER_CELERY_BROKER_URL: redis://redis:6379/0
      CRAWLLMER_CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - redis
    command: >
      bash -lc "pip install uv && uv sync && uv run python -m crawllmer.app.indexer"

volumes:
  crawllmer-db:
